version: "3.9"
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: lain42
      POSTGRES_USER: lain42
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lain42}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lain42"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    ports:
      - "8000:8000"
      - "50051:50051"
    volumes:
      - images:/data/images
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://lain42:${DB_PASSWORD:-lain42}@db:5432/lain42
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITEE_CLIENT_ID: ${GITEE_CLIENT_ID:-}
      GITEE_CLIENT_SECRET: ${GITEE_CLIENT_SECRET:-}
      GITCODE_CLIENT_ID: ${GITCODE_CLIENT_ID:-}
      GITCODE_CLIENT_SECRET: ${GITCODE_CLIENT_SECRET:-}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost","http://localhost:80"]'
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - images:/usr/share/nginx/html/images:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  images:
